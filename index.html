<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Relatório de Pronta Entrega</title>
    <style>
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --color-bg: #ffffff;
            --color-text: #1d1d1f;
            --color-text-secondary: #86868b;
            --color-accent: #0071e3;
            --color-accent-hover: #0077ed;
            --color-border: #d2d2d7;
            --color-bg-secondary: #f5f5f7;
            --color-success: #34c759;
            --color-error: #ff3b30;
            --color-warning: #ff9500;
            --spacing-xs: 8px;
            --spacing-sm: 16px;
            --spacing-md: 24px;
            --spacing-lg: 32px;
            --spacing-xl: 48px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --shadow-sm: 0 2px 6px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.12);
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-sans);
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            padding: var(--spacing-md);
        }
        h1, h2, h3 { font-weight: 600; letter-spacing: -0.015em; }
        h1 { font-size: 32px; margin-bottom: var(--spacing-md); text-align: center; }
        h2 { font-size: 24px; margin-bottom: var(--spacing-sm); }
        h3 { font-size: 18px; margin-bottom: var(--spacing-xs); }
        .container { max-width: 1100px; margin: 0 auto; }
        .card {
            background-color: var(--color-bg);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-md); }
        .section { margin-bottom: var(--spacing-xl); }
        .form-group { margin-bottom: var(--spacing-md); }
        label { display: block; margin-bottom: var(--spacing-xs); font-weight: 500; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: var(--spacing-xs) var(--spacing-sm);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-family: var(--font-sans);
            font-size: 15px;
            transition: var(--transition);
        }
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 2px rgba(0,113,227,0.2);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-sm);
            border: none;
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-primary { background-color: var(--color-accent); color: white; }
        .btn-primary:hover:not(:disabled) { background-color: var(--color-accent-hover); }
        .btn-secondary { background-color: var(--color-bg-secondary); color: var(--color-text); }
        .btn-secondary:hover:not(:disabled) { background-color: var(--color-border); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .file-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-md) var(--spacing-lg);
            border: 2px dashed var(--color-border);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-md);
            transition: var(--transition);
        }
        .file-upload:hover { border-color: var(--color-accent); }
        .file-upload-icon { font-size: 36px; margin-bottom: var(--spacing-sm); color: var(--color-accent); }
        .file-upload-text { margin-bottom: var(--spacing-xs); font-weight: 500; }
        .file-upload-subtext { color: var(--color-text-secondary); margin-bottom: var(--spacing-sm); }
        .model-section {
            margin-bottom: var(--spacing-md);
            background-color: var(--color-bg);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .model-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm) var(--spacing-md);
            background-color: var(--color-bg-secondary);
            border-bottom: 1px solid var(--color-border);
            flex-wrap: wrap;
            gap: var(--spacing-xs);
        }
        .model-header-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }
        .model-title { font-size: 18px; font-weight: 600; margin: 0; }
        .selection-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            transition: var(--transition);
            white-space: nowrap;
        }
        .badge-all     { background-color: var(--color-success); }
        .badge-partial { background-color: var(--color-warning); }
        .badge-none    { background-color: var(--color-error); }
        .toggle-all-btn {
            font-size: 12px;
            color: var(--color-accent);
            cursor: pointer;
            text-decoration: underline;
            white-space: nowrap;
            background: none;
            border: none;
            font-family: var(--font-sans);
            padding: 0;
        }
        .toggle-all-btn:hover { color: var(--color-accent-hover); }
        .button-group { display: flex; gap: var(--spacing-xs); flex-wrap: wrap; }
        .model-data { padding: 0; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--color-border);
        }
        .data-table th {
            font-weight: 500;
            color: white;
            background-color: var(--color-accent);
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .col-check { width: 44px; min-width: 44px; text-align: center !important; padding: 8px 6px !important; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background-color: var(--color-bg-secondary); }
        /* Linha desmarcada */
        .data-table tr.row-unchecked td:not(.col-check) {
            opacity: 0.35;
            text-decoration: line-through;
            text-decoration-color: var(--color-error);
        }
        .item-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--color-accent);
        }
        .notification {
            position: fixed;
            top: var(--spacing-md);
            right: var(--spacing-md);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-sm);
            color: white;
            box-shadow: var(--shadow-md);
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.3s ease-in-out;
            z-index: 100;
        }
        .notification.show { transform: translateY(0); opacity: 1; }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(0,113,227,0.2);
            border-radius: 50%;
            border-top-color: var(--color-accent);
            animation: spin 1s linear infinite;
            margin-bottom: var(--spacing-sm);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            body { padding: var(--spacing-sm); }
            .card { padding: var(--spacing-sm); }
            .model-header { flex-direction: column; align-items: flex-start; }
            .data-table th, .data-table td { padding: 6px 8px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Organizador de Relatório de Pronta Entrega</h1>

    <div class="section">
        <div class="card">
            <form id="uploadForm">
                <div class="file-upload" id="dropArea">
                    <div class="file-upload-icon">📄</div>
                    <div class="file-upload-text">Arraste seu arquivo ou clique para selecionar</div>
                    <div class="file-upload-subtext">Formatos suportados: Excel (.xlsx, .xls) e OpenDocument (.ods)</div>
                    <input type="file" id="fileInput" name="fileInput" accept=".xlsx,.xls,.ods" style="margin-bottom:15px;" />
                </div>
                <div class="form-group">
                    <label for="colDescricao">Índice da coluna de Descrição:</label>
                    <input type="number" id="colDescricao" value="0" min="0" />
                </div>
                <div class="form-group">
                    <label for="colQuantidade">Índice da coluna de Quantidade:</label>
                    <input type="number" id="colQuantidade" value="1" min="0" />
                </div>
                <div class="form-group">
                    <label for="colCor">Índice da coluna de Cor:</label>
                    <input type="number" id="colCor" value="2" min="0" />
                </div>
                <div class="form-group">
                    <label>Tratamento para o termo "RIBANA":</label>
                    <div style="margin-top:8px;">
                        <select id="ribanaOption" style="width:100%;padding:8px;border-radius:4px;border:1px solid var(--color-border);">
                            <option value="manter">Manter como RIBANA</option>
                            <option value="punho" selected>Substituir por PUNHO</option>
                            <option value="tira">Substituir por TIRA</option>
                            <option value="peitilho">Substituir por PEITILHO</option>
                            <option value="custom">Usar termo personalizado</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" id="customRibanaGroup" style="display:none;">
                    <label for="customRibana">Termo personalizado:</label>
                    <input type="text" id="customRibana" placeholder="Digite o termo para substituir RIBANA" />
                </div>
                <div class="form-group" style="text-align:center;">
                    <button type="button" class="btn btn-primary" id="processButton" disabled>Processar Arquivo</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loadingDiv" class="loading" style="display:none;">
        <div class="spinner"></div>
        <div>Processando seu arquivo...</div>
    </div>

    <div id="resultDiv" style="display:none;">
        <h2>Resultados Processados</h2>
        <div id="modelContainers"></div>
    </div>
</div>

<div class="notification" id="notification"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {

    var fileInput         = document.getElementById('fileInput');
    var dropArea          = document.getElementById('dropArea');
    var processButton     = document.getElementById('processButton');
    var loadingDiv        = document.getElementById('loadingDiv');
    var resultDiv         = document.getElementById('resultDiv');
    var modelContainers   = document.getElementById('modelContainers');
    var notification      = document.getElementById('notification');
    var uploadForm        = document.getElementById('uploadForm');
    var colDescricaoEl    = document.getElementById('colDescricao');
    var colQuantidadeEl   = document.getElementById('colQuantidade');
    var colCorEl          = document.getElementById('colCor');
    var ribanaOption      = document.getElementById('ribanaOption');
    var customRibanaGroup = document.getElementById('customRibanaGroup');
    var customRibana      = document.getElementById('customRibana');

    ribanaOption.addEventListener('change', function () {
        customRibanaGroup.style.display = (ribanaOption.value === 'custom') ? 'block' : 'none';
    });

    var fileData       = [];
    var processedData  = [];
    var allModelGroups = {};

    // ── File input / drag-drop ──────────────────────────────────────────────
    fileInput.addEventListener('change', function () {
        if (fileInput.files.length > 0) {
            processButton.disabled = false;
            document.querySelector('.file-upload-text').textContent = 'Arquivo selecionado: ' + fileInput.files[0].name;
        } else {
            processButton.disabled = true;
            document.querySelector('.file-upload-text').textContent = 'Arraste seu arquivo ou clique para selecionar';
        }
    });

    ['dragenter','dragover','dragleave','drop'].forEach(function(ev) {
        dropArea.addEventListener(ev, function(e) { e.preventDefault(); e.stopPropagation(); });
    });
    ['dragenter','dragover'].forEach(function(ev) {
        dropArea.addEventListener(ev, function() {
            dropArea.style.borderColor = 'var(--color-accent)';
            dropArea.style.backgroundColor = 'rgba(0,113,227,0.05)';
        });
    });
    ['dragleave','drop'].forEach(function(ev) {
        dropArea.addEventListener(ev, function() {
            dropArea.style.borderColor = 'var(--color-border)';
            dropArea.style.backgroundColor = 'var(--color-bg)';
        });
    });
    dropArea.addEventListener('drop', function(e) {
        var files = e.dataTransfer.files;
        if (files.length > 0) {
            fileInput.files = files;
            processButton.disabled = false;
            document.querySelector('.file-upload-text').textContent = 'Arquivo selecionado: ' + files[0].name;
        }
    });

    uploadForm.addEventListener('submit', function(e) { e.preventDefault(); });

    // ── Process file ────────────────────────────────────────────────────────
    processButton.addEventListener('click', processFile);

    function processFile() {
        var file = fileInput.files[0];
        if (!file) { alert('Por favor, selecione um arquivo.'); return; }

        loadingDiv.style.display = 'flex';
        resultDiv.style.display  = 'none';
        modelContainers.innerHTML = '';

        var reader = new FileReader();
        reader.onload = function(e) {
            try {
                var workbook  = XLSX.read(e.target.result, { type: 'array' });
                var worksheet = workbook.Sheets[workbook.SheetNames[0]];
                var jsonData  = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                fileData      = jsonData.filter(function(row) { return row.length > 0; });
                processData();
                displayResults();
            } catch (err) {
                console.error(err);
                alert('Erro ao processar o arquivo: ' + err.message);
            } finally {
                loadingDiv.style.display = 'none';
            }
        };
        reader.onerror = function() { alert('Erro ao ler o arquivo.'); loadingDiv.style.display = 'none'; };
        reader.readAsArrayBuffer(file);
    }

    function isEmptyQuantity(v) {
        if (v === undefined || v === null) return true;
        if (typeof v === 'string') { var t = v.trim(); if (t === '' || t === '0') return true; }
        if (v === 0) return true;
        var n = Number(v);
        return isNaN(n) || n <= 0;
    }

    function isEmptyRow(row, cd, cq) {
        if (!row || row.length === 0) return true;
        var d = row[cd];
        if (!d || (typeof d === 'string' && d.trim() === '')) return true;
        return isEmptyQuantity(row[cq]);
    }

    function processData() {
        if (fileData.length === 0) return;
        try {
            var cd = parseInt(colDescricaoEl.value);
            var cq = parseInt(colQuantidadeEl.value);
            var cc = parseInt(colCorEl.value);

            var startRow = fileData[0].some(function(cell) {
                return typeof cell === 'string' && (
                    String(cell).toLowerCase().includes('descr') ||
                    String(cell).toLowerCase().includes('quant') ||
                    String(cell).toLowerCase().includes('cor')
                );
            }) ? 1 : 0;

            processedData = [];

            var cleanedData = [];
            for (var i = startRow; i < fileData.length; i++) {
                if (!isEmptyRow(fileData[i], cd, cq)) {
                    cleanedData.push({ originalIndex: i, row: fileData[i] });
                }
            }

            cleanedData.forEach(function(entry) {
                var row = entry.row;
                var descricao  = String(row[cd] || '').replace(/[\r\n\t]/g,' ').replace(/\s+/g,' ').trim();
                var quantidade = row[cq];
                var cor        = String(row[cc] || '').replace(/[\r\n\t]/g,' ').replace(/\s+/g,' ').trim();

                if (isEmptyQuantity(quantidade)) return;

                var produto = descricao.split(' ')[0] || '';
                if (produto.toUpperCase() === 'RIBANA') {
                    if      (ribanaOption.value === 'punho')    produto = 'PUNHO';
                    else if (ribanaOption.value === 'tira')     produto = 'TIRA';
                    else if (ribanaOption.value === 'peitilho') produto = 'PEITILHO';
                    else if (ribanaOption.value === 'custom') {
                        var cv = customRibana.value.trim();
                        if (cv) produto = cv.toUpperCase();
                    }
                }

                var tamMatch = descricao.match(/TAM\.([^\s]+)/);
                var tamanho  = tamMatch ? tamMatch[1] : '';

                var modMatch = descricao.match(/MOD\.(\d+)/);
                var modelo   = modMatch ? modMatch[1] : '';

                var desc = produto;
                if (tamanho) desc += ' ' + tamanho;
                if (modelo)  desc += ' / ' + modelo;
                desc = desc.trim();

                if (desc && !isEmptyQuantity(quantidade)) {
                    processedData.push({
                        descricaoSimplificada: desc,
                        produto: produto,
                        tamanho: tamanho,
                        modelo:  modelo,
                        quantidade: String(quantidade).replace(/[\r\n\t\s]/g,''),
                        cor: cor
                    });
                }
            });
        } catch (err) {
            console.error(err);
            alert('Erro ao processar dados: ' + err.message);
        }
    }

    // ── Display results ─────────────────────────────────────────────────────
    function displayResults() {
        if (processedData.length === 0) {
            resultDiv.innerHTML = '<div class="card"><p>Nenhum resultado encontrado.</p></div>';
            resultDiv.style.display = 'block';
            return;
        }

        allModelGroups = {};
        processedData.forEach(function(item) {
            if (!allModelGroups[item.modelo]) allModelGroups[item.modelo] = [];
            allModelGroups[item.modelo].push(item);
        });
        Object.keys(allModelGroups).forEach(function(m) {
            allModelGroups[m].sort(function(a,b) { return a.cor.localeCompare(b.cor); });
        });

        modelContainers.innerHTML = '';

        Object.keys(allModelGroups).sort().forEach(function(modelo) {
            // 'items' é o array DESTE modelo — capturado no closure abaixo
            var items = allModelGroups[modelo];

            // Array paralelo de checkboxes (índice corresponde a items[i])
            var checkboxes = [];

            // ── Seção do modelo ──
            var modelSection = document.createElement('div');
            modelSection.className = 'model-section';

            // Header
            var modelHeader = document.createElement('div');
            modelHeader.className = 'model-header';

            var headerLeft = document.createElement('div');
            headerLeft.className = 'model-header-left';

            var modelTitle = document.createElement('h3');
            modelTitle.className = 'model-title';
            modelTitle.textContent = 'MODELO ' + modelo;

            var badge = document.createElement('span');
            badge.className = 'selection-badge badge-all';
            badge.textContent = items.length + ' / ' + items.length + ' selecionados';

            var toggleBtn = document.createElement('button');
            toggleBtn.className = 'toggle-all-btn';
            toggleBtn.textContent = 'Desmarcar todos';

            headerLeft.appendChild(modelTitle);
            headerLeft.appendChild(badge);
            headerLeft.appendChild(toggleBtn);

            var buttonGroup = document.createElement('div');
            buttonGroup.className = 'button-group';

            var copyButton = document.createElement('button');
            copyButton.className = 'btn btn-primary';
            copyButton.textContent = 'Copiar';

            var pdfButton = document.createElement('button');
            pdfButton.className = 'btn btn-secondary';
            pdfButton.textContent = 'Exportar PDF';

            buttonGroup.appendChild(copyButton);
            buttonGroup.appendChild(pdfButton);

            modelHeader.appendChild(headerLeft);
            modelHeader.appendChild(buttonGroup);

            // Tabela
            var modelData = document.createElement('div');
            modelData.className = 'model-data';

            var table = document.createElement('table');
            table.className = 'data-table';

            var thead = document.createElement('thead');
            var headerRow = document.createElement('tr');
            var thCheck = document.createElement('th');
            thCheck.className = 'col-check';
            thCheck.textContent = '✓';
            headerRow.appendChild(thCheck);
            ['Descrição','Quantidade','Cor'].forEach(function(txt) {
                var th = document.createElement('th');
                th.textContent = txt;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            var tbody = document.createElement('tbody');

            // Criar uma linha por item e armazenar o checkbox no array paralelo
            items.forEach(function(item, idx) {
                var tr = document.createElement('tr');

                var tdCheck = document.createElement('td');
                tdCheck.className = 'col-check';

                var cb = document.createElement('input');
                cb.type    = 'checkbox';
                cb.className = 'item-checkbox';
                cb.checked = true; // padrão: selecionado

                // Guardar referência no array paralelo
                checkboxes.push(cb);

                cb.addEventListener('change', function() {
                    tr.classList.toggle('row-unchecked', !cb.checked);
                    refreshBadge();
                });

                tdCheck.appendChild(cb);
                tr.appendChild(tdCheck);

                var tdDesc = document.createElement('td');
                tdDesc.textContent = item.descricaoSimplificada;
                tr.appendChild(tdDesc);

                var tdQtd = document.createElement('td');
                tdQtd.textContent = item.quantidade;
                tr.appendChild(tdQtd);

                var tdCor = document.createElement('td');
                tdCor.textContent = item.cor;
                tr.appendChild(tdCor);

                tbody.appendChild(tr);
            });

            table.appendChild(tbody);
            modelData.appendChild(table);
            modelSection.appendChild(modelHeader);
            modelSection.appendChild(modelData);
            modelContainers.appendChild(modelSection);

            // ── Helpers de seleção ──
            function getSelectedItems() {
                // Filtra items[] usando o array paralelo checkboxes[]
                return items.filter(function(_, idx) {
                    return checkboxes[idx].checked;
                });
            }

            function refreshBadge() {
                var total    = checkboxes.length;
                var selected = checkboxes.filter(function(cb) { return cb.checked; }).length;
                badge.textContent = selected + ' / ' + total + ' selecionados';
                badge.className   = 'selection-badge';
                if      (selected === total) { badge.classList.add('badge-all');     toggleBtn.textContent = 'Desmarcar todos'; }
                else if (selected === 0)     { badge.classList.add('badge-none');    toggleBtn.textContent = 'Marcar todos'; }
                else                         { badge.classList.add('badge-partial'); toggleBtn.textContent = 'Marcar todos'; }
            }

            toggleBtn.addEventListener('click', function() {
                var anyChecked = checkboxes.some(function(cb) { return cb.checked; });
                var newState   = !anyChecked;
                checkboxes.forEach(function(cb, idx) {
                    cb.checked = newState;
                    tbody.querySelectorAll('tr')[idx].classList.toggle('row-unchecked', !newState);
                });
                refreshBadge();
            });

            // ── Botões deste modelo — usam getSelectedItems() ──
            copyButton.addEventListener('click', function() {
                var sel = getSelectedItems();
                if (sel.length === 0) { showNotification('Nenhum item selecionado!', true); return; }
                var text = 'Descrição\tQuantidade\tCor\n';
                sel.forEach(function(item) {
                    text += item.descricaoSimplificada + '\t' + item.quantidade + '\t' + item.cor + '\n';
                });
                try {
                    navigator.clipboard.writeText(text)
                        .then(function() { showNotification('Copiado com sucesso!'); })
                        .catch(function() { fallbackCopy(text); });
                } catch(e) { fallbackCopy(text); }
            });

            pdfButton.addEventListener('click', function() {
                var sel = getSelectedItems();
                if (sel.length === 0) { showNotification('Nenhum item selecionado!', true); return; }
                exportSingleModelPDF(modelo, sel);
            });
        });

        // ── Botão exportar todos ──
        if (Object.keys(allModelGroups).length > 0) {
            var exportAllSection = document.createElement('div');
            exportAllSection.style.textAlign = 'center';
            exportAllSection.style.marginTop  = 'var(--spacing-md)';

            var exportAllButton = document.createElement('button');
            exportAllButton.className = 'btn btn-primary';
            exportAllButton.style.padding  = 'var(--spacing-sm) var(--spacing-md)';
            exportAllButton.style.fontSize = '16px';
            exportAllButton.textContent    = 'Exportar todos os modelos em PDF';
            exportAllButton.addEventListener('click', exportAllModelsPDF);

            exportAllSection.appendChild(exportAllButton);
            modelContainers.appendChild(exportAllSection);
        }

        resultDiv.style.display = 'block';
    }

    // ── Copy fallback ───────────────────────────────────────────────────────
    function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:0;left:0;width:2em;height:2em;opacity:0;';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        try {
            document.execCommand('copy') ? showNotification('Copiado com sucesso!') : showNotification('Não foi possível copiar.', true);
        } catch(e) { showNotification('Erro ao copiar.', true); }
        document.body.removeChild(ta);
    }

    // ── PDF: opções da tabela (novo objeto a cada chamada) ─────────────────
    function makeTableOptions(body) {
        return {
            head: [['Descrição', 'Quantidade', 'Cor']],
            body: body,
            startY: 25,
            columnStyles: { 0:{ cellWidth:95 }, 1:{ cellWidth:37 }, 2:{ cellWidth:58 } },
            styles:     { fontSize:10, cellPadding:0.8, lineColor:[200,200,200], lineWidth:0.05, minCellHeight:3.5, halign:'left', valign:'middle' },
            headStyles: { fillColor:[0,113,227], textColor:[255,255,255], fontStyle:'bold', halign:'center', fontSize:11, cellPadding:1, minCellHeight:4 },
            bodyStyles: { valign:'middle', cellPadding:0.8 },
            margin:     { top:25, bottom:8, left:10, right:10 },
            theme: 'grid', rowPageBreak:'avoid', showHead:'everyPage',
            tableLineWidth:0.05, tableLineColor:[200,200,200]
        };
    }

    function addPageHeader(doc, title) {
        doc.setFillColor(0,113,227);
        doc.rect(0, 0, doc.internal.pageSize.width, 20, 'F');
        doc.setTextColor(255,255,255);
        doc.setFontSize(16);
        doc.setFont('helvetica','bold');
        doc.text(title, doc.internal.pageSize.width / 2, 13, { align:'center' });
    }

    function addPageFooter(doc) {
        var total = doc.internal.getNumberOfPages();
        for (var p = 1; p <= total; p++) {
            doc.setPage(p);
            doc.setFontSize(7);
            doc.setTextColor(100,100,100);
            doc.text('Página ' + p + ' de ' + total, doc.internal.pageSize.width / 2, doc.internal.pageSize.height - 8, { align:'center' });
        }
    }

    // Exporta UM único modelo — recebe o array já filtrado
    function exportSingleModelPDF(modelo, selectedItems) {
        try {
            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF();
            addPageHeader(doc, 'MODELO ' + modelo);
            var body = selectedItems.map(function(item) {
                return [item.descricaoSimplificada, item.quantidade, item.cor];
            });
            doc.autoTable(makeTableOptions(body));
            addPageFooter(doc);
            doc.save('modelo_' + modelo + '_produtos.pdf');
            showNotification('PDF exportado com sucesso!');
        } catch(err) {
            console.error(err);
            alert('Erro ao exportar PDF: ' + err.message);
        }
    }

    // Exporta TODOS os modelos — lê seleção de cada modelo via allModelGroups + checkboxes
    function exportAllModelsPDF() {
        // Para ter acesso às seleções de cada modelo, reconstruímos a lista
        // lendo os checkboxes diretamente de cada linha da tabela
        var models = Object.keys(allModelGroups).sort();

        // Coletar itens selecionados por modelo lendo o DOM
        var selectedByModel = {};
        models.forEach(function(modelo) {
            var items    = allModelGroups[modelo];
            var sections = modelContainers.querySelectorAll('.model-section');
            var section  = null;
            sections.forEach(function(s) {
                var title = s.querySelector('.model-title');
                if (title && title.textContent === 'MODELO ' + modelo) section = s;
            });

            if (!section) { selectedByModel[modelo] = items.slice(); return; }

            var rows = section.querySelectorAll('tbody tr');
            selectedByModel[modelo] = items.filter(function(_, idx) {
                var row = rows[idx];
                if (!row) return true;
                var cb = row.querySelector('.item-checkbox');
                return cb ? cb.checked : true;
            });
        });

        var hasAny = models.some(function(m) { return selectedByModel[m].length > 0; });
        if (!hasAny) { showNotification('Nenhum item selecionado!', true); return; }

        try {
            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF();

            // Capa
            doc.setFillColor(0,113,227);
            doc.rect(0, 0, doc.internal.pageSize.width, 30, 'F');
            doc.setTextColor(255,255,255);
            doc.setFontSize(18);
            doc.setFont('helvetica','bold');
            doc.text('CATÁLOGO DE PRODUTOS', doc.internal.pageSize.width / 2, 20, { align:'center' });

            doc.setTextColor(0,0,0);
            doc.setFontSize(12);
            doc.text('Índice de Modelos', 15, 40);

            var validModels = models.filter(function(m) { return selectedByModel[m].length > 0; });
            var yPos = 48;
            validModels.forEach(function(modelo, idx) {
                doc.setFontSize(10);
                doc.text('Modelo ' + modelo, 20, yPos);
                doc.setFontSize(9);
                doc.text('Página ' + (idx + 2), 150, yPos);
                yPos += 8;
                if (yPos > 270 && idx < validModels.length - 1) { doc.addPage(); yPos = 20; }
            });

            // Uma página por modelo
            validModels.forEach(function(modelo) {
                var sel = selectedByModel[modelo];
                doc.addPage();
                addPageHeader(doc, 'MODELO ' + modelo);
                var body = sel.map(function(item) {
                    return [item.descricaoSimplificada, item.quantidade, item.cor];
                });
                doc.autoTable(makeTableOptions(body));
            });

            addPageFooter(doc);
            doc.save('catalogo_completo_produtos.pdf');
            showNotification('Catálogo completo exportado com sucesso!');
        } catch(err) {
            console.error(err);
            alert('Erro ao exportar PDF: ' + err.message);
        }
    }

    // ── Notification ────────────────────────────────────────────────────────
    function showNotification(message, isError) {
        notification.textContent = message;
        notification.style.backgroundColor = isError ? 'var(--color-error)' : 'var(--color-success)';
        notification.classList.add('show');
        setTimeout(function() { notification.classList.remove('show'); }, 3000);
    }
});
</script>
</body>
</html>
